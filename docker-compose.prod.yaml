services:
  doggopaste:
    container_name: doggopaste
    build:
      context: .
      dockerfile: ./apps/proxy/Dockerfile
    environment:
      APP_NAME: "DoggoPaste"
      APP_URL: "http://localhost:3002"
      APP_LAN: "http://192.168.100.5:3002"
      DATABASE_URL: "postgresql://doggo:changeme@doggopaste_db_prod:5432/doggopaste"
      BETTER_AUTH_SECRET: "super_secret_doggo"
      GITHUB_CLIENT_ID: "your_github_client_id"
      GITHUB_CLIENT_SECRET: "your_github_client_secret"
    ports:
      - 3002:3002
    restart: unless-stopped
    depends_on:
      - doggopaste_db_prod
    networks:
      - doggopaste_network
      # - caddy

  doggopaste_db_prod:
    image: postgres:17
    container_name: doggopaste_db_prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: doggo
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: doggopaste
    ports:
      - 5432:5432
    volumes:
      - doggopaste_db_prod_data:/var/lib/postgresql/data
    networks:
      - doggopaste_network

volumes:
  doggopaste_db_prod_data:

networks:
  doggopaste_network:
    driver: bridge
  # caddy:
  #   name: caddy
  #   external: true
